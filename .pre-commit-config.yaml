# Pre-commit hooks для Lorenzo
# Установка:
#   pip install pre-commit
#   pre-commit install
#
# Прогон вручную:
#   pre-commit run --all-files

repos:
  # Базовые проверки
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'  # markdown часто использует trailing space для br
      - id: end-of-file-fixer
        exclude: '^docs/(obsidian|confluence)/|^tasks/_generated/'
      - id: check-yaml
        files: '^(\.github/|tasks/.+\.task\.yaml$|\.pre-commit-config\.yaml$)'
      - id: check-json
        files: '\.json$'
        exclude: '^docs/scripts_catalog\.json$'  # авто-генерируется
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=2000']
        exclude: '\.(mhtml|pdf|epub)$|^Поиск|^Комбинирование|^Вакансии'

  # Локальные хуки (используют наши скрипты)
  - repo: local
    hooks:
      - id: validate-templates
        name: Валидация шаблонов
        entry: python scripts/improve_validate_templates.py --strict
        language: system
        files: '^docs/.+\.md$'
        pass_filenames: false

      - id: validate-task-manifests
        name: Валидация манифестов задач
        entry: python scripts/improve_task_codegen.py --validate
        language: system
        files: '^tasks/.+\.task\.yaml$'
        pass_filenames: false

      - id: python-compile
        name: Python syntax check
        entry: python -m py_compile
        language: system
        files: '^(scripts|docs-toolkit)/.+\.py$'

      - id: regenerate-catalogs
        name: Регенерация каталогов (только при изменении scripts/tasks)
        entry: bash -c 'python scripts/improve_scripts_catalog.py && python scripts/improve_task_codegen.py'
        language: system
        files: '^(scripts/improve_.+\.py|tasks/.+\.task\.yaml)$'
        pass_filenames: false
