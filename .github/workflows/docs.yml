# Автоматически создан improve_ci_config.py
# Обновляет только безопасные индексы — НЕ запускает скрипты изменяющие контент
name: docs-update

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # нужен для git log в rss/version_diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}

      - name: Install dependencies
        run: pip install --quiet anthropic || true

      # ВАЖНО: запускаем только скрипты которые НЕ изменяют контентные файлы.
      # Скрипты типа improve_summaries / improve_readmes / improve_qa / improve_similar
      # должны запускаться ТОЛЬКО вручную — они зависят от предварительно
      # сгенерированных индексов и при запуске на чистом CI перезаписывают
      # более богатый авто-генерированный контент заглушками.

      - name: Update search index
        run: python scripts/improve_search_index.py

      - name: Generate RSS feed
        run: python scripts/improve_rss.py

      - name: Update health metrics
        run: python scripts/improve_health.py

      - name: Update stats
        run: python scripts/improve_stats.py

      - name: Commit updated docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Коммитим только конкретные безопасные файлы, не весь docs/
          git add docs/search_index.json docs/feed.rss docs/feed.atom \
                  docs/HEALTH.md docs/STATS.md || true
          git diff --staged --quiet || git commit -m "docs: auto-update metrics [skip ci]"
          git push
