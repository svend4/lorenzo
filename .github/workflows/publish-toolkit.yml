name: Publish docs-toolkit

on:
  push:
    tags:
      - "toolkit-v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Куда публиковать"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
          - both

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: pip install --upgrade pip build twine

      - name: Get version
        id: version
        working-directory: docs-toolkit
        run: |
          version=$(python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "Building docs-toolkit ${version}"

      - name: Build wheel and sdist
        working-directory: docs-toolkit
        run: python -m build

      - name: Check distribution
        working-directory: docs-toolkit
        run: twine check dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-toolkit-dist
          path: docs-toolkit/dist/
          retention-days: 7

  test-install:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v4
        with:
          name: docs-toolkit-dist
          path: dist/

      - name: Install wheel
        run: pip install dist/*.whl

      - name: Smoke test
        run: |
          docstoolkit --help
          docstoolkit doc list-templates || true
          docstoolkit ingest --list-plugins || true

  publish-testpypi:
    needs: [build, test-install]
    if: github.event.inputs.target == 'testpypi' || github.event.inputs.target == 'both' || startsWith(github.ref, 'refs/tags/toolkit-v')
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs-toolkit-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    needs: [build, test-install]
    if: github.event.inputs.target == 'pypi' || github.event.inputs.target == 'both'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs-toolkit-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: docs-toolkit
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/docs-toolkit:latest
            ghcr.io/${{ github.repository_owner }}/docs-toolkit:${{ needs.build.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.build.outputs.version }}
